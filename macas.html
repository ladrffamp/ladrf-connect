<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Macas - LADRF Connect</title>

<style>

body{

font-family:Arial,sans-serif;
background:#f4f6f9;
padding:30px;

}


h1{

color:#0B7A3B;

}


.container{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}


.maca{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;

}


.livre{

border-top:10px solid #4CAF50;

}


.ocupada{

border-top:10px solid #E53935;

}


button{

background:#0B7A3B;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;

}

</style>

</head>


<body>


<h1>
Controle de Macas
</h1>


<div class="container" id="macas">

</div>



<script type="module" src="macas.js"></script>

<script type="module" src="permissoes.js"></script>


</body>

</html>
