<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Macas - LADRF Connect</title>


<style>

body{

font-family:Arial,sans-serif;

background:#f4f6f9;

padding:30px;

}



/* BOTÃO MENU */

.btn-voltar{

position:fixed;

top:20px;

left:20px;

z-index:9999;

background:#0B7A3B;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

font-size:15px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}



.btn-voltar:hover{

background:#075c2b;

}





h1{

color:#0B7A3B;

}



.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



.maca{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

text-align:center;

}



.livre{

border-top:10px solid #4CAF50;

}



.ocupada{

border-top:10px solid #E53935;

}



button{

background:#0B7A3B;

color:white;

border:none;

padding:12px;

border-radius:8px;

cursor:pointer;

}



button:hover{

opacity:.85;

}



</style>


</head>

<button class="btn-voltar" onclick="window.location.href='index.html'">

🏠 Menu Inicial

</button>





<h1>

</h1>
