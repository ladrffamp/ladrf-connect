<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recepção - LADRF Connect</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f5;
padding:25px;
}

h1{
margin-bottom:25px;
color:#0B7A3B;
}

.grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:25px;

}

.card{

background:white;

border-radius:15px;

padding:20px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#0B7A3B;

color:white;

padding:12px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #eee;

}

button{

padding:8px 15px;

border:none;

border-radius:8px;

background:#0B7A3B;

color:white;

cursor:pointer;

}

.macas{

display:grid;

grid-template-columns:1fr;

gap:15px;

}

.maca{

padding:20px;

border-radius:12px;

color:white;

font-weight:bold;

text-align:center;

}

.livre{

background:#4CAF50;

}

.ocupada{

background:#E53935;

}

</style>

</head>

<body>

<h1>Painel da Recepção</h1>

<div class="grid">

<div class="card">

<h2>Fila de Espera</h2>

<br>

<table>

<thead>

<tr>

<th>Paciente</th>

<th>Modalidade</th>

<th>Ação</th>

</tr>

</thead>

<tbody id="fila">

</tbody>

</table>

</div>

<div class="card">

<h2>Macas</h2>

<br>

<div class="macas" id="macas">

</div>

</div>

</div>

<script type="module" src="recepcao.js"></script>

</body>

</html>
