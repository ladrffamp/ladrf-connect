<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Avaliação do Atendimento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#eef3f7;

display:flex;

justify-content:center;

padding:40px;

}

.card{

background:white;

width:650px;

padding:35px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.12);

}

h1{

text-align:center;

color:#0B7A3B;

margin-bottom:10px;

}

.sub{

text-align:center;

margin-bottom:30px;

color:#777;

}

.info{

background:#f7f7f7;

padding:15px;

border-radius:12px;

margin-bottom:25px;

}

.info p{

margin:8px 0;

}

h3{

margin:25px 0 10px;

color:#0B7A3B;

}

.estrelas{

display:flex;

justify-content:center;

gap:10px;

font-size:35px;

cursor:pointer;

margin:20px 0;

}

.star{

color:#ccc;

transition:.2s;

}

.star.ativa{

color:#FFD700;

}

label{

display:block;

margin:8px 0;

cursor:pointer;

}

textarea{

width:100%;

height:120px;

padding:15px;

border-radius:10px;

border:1px solid #ccc;

resize:none;

margin-top:10px;

}

button{

margin-top:30px;

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#0B7A3B;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#096430;

}

</style>

</head>

<body>

<div class="card">

<h1>

Avaliação do Atendimento

</h1>

<p class="sub">

Sua opinião é muito importante 💚

</p>

<div class="info">

<p>

<strong>Paciente:</strong>

<span id="paciente">

Carregando...

</span>

</p>

<p>

<strong>Membro:</strong>

<span id="membro">

Carregando...

</span>

</p>

</div>

<h3>

Nota geral

</h3>

<div class="estrelas">

<span class="star" data-star="1">★</span>

<span class="star" data-star="2">★</span>

<span class="star" data-star="3">★</span>

<span class="star" data-star="4">★</span>

<span class="star" data-star="5">★</span>

</div>

<h3>

Tempo de espera

</h3>

<label><input type="radio" name="espera" value="Excelente"> Excelente</label>

<label><input type="radio" name="espera" value="Bom"> Bom</label>

<label><input type="radio" name="espera" value="Regular"> Regular</label>

<label><input type="radio" name="espera" value="Ruim"> Ruim</label>

<h3>

Atendimento da equipe

</h3>

<label><input type="radio" name="equipe" value="Excelente"> Excelente</label>

<label><input type="radio" name="equipe" value="Bom"> Bom</label>

<label><input type="radio" name="equipe" value="Regular"> Regular</label>

<label><input type="radio" name="equipe" value="Ruim"> Ruim</label>

<h3>

Seu problema foi resolvido?

</h3>

<label><input type="radio" name="resolucao" value="Sim"> Sim</label>

<label><input type="radio" name="resolucao" value="Parcialmente"> Parcialmente</label>

<label><input type="radio" name="resolucao" value="Não"> Não</label>

<h3>

Comentário

</h3>

<textarea
id="comentario"
placeholder="Escreva aqui..."></textarea>

<button id="btnEnviar">

Enviar Avaliação

</button>

</div>

<script type="module" src="avaliacao.js"></script>

</body>

</html>
