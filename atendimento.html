<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atendimento | LADRF Connect</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

margin:0;
background:#eef3f7;
padding:30px;

}


/* BOTÃO VOLTAR MENU */

.btn-menu{

position:fixed;

top:20px;

left:20px;

z-index:99999;

background:#0B7A3B;

color:white;

border:none;

padding:15px 20px;

border-radius:10px;

font-size:16px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}



.btn-menu:hover{

background:#075c2b;

}




.container{

max-width:800px;

margin:auto;

}



.card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

}



h1{

text-align:center;

color:#0B7A3B;

}



h2{

color:#0B7A3B;

}



.box{

background:#f5f5f5;

padding:20px;

border-radius:15px;

margin-bottom:25px;

}



.info{

font-size:16px;

line-height:1.8;

}



label{

display:block;

font-weight:bold;

margin-top:15px;

}



textarea{

width:100%;

height:120px;

padding:15px;

border-radius:10px;

border:1px solid #ccc;

resize:none;

margin-top:8px;

}



.btn-finalizar{

width:100%;

padding:15px;

margin-top:25px;

background:#0B7A3B;

color:white;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

}



.btn-finalizar:hover{

background:#075c2b;

}




.qr-area{

margin-top:40px;

padding-top:20px;

border-top:1px solid #ddd;

text-align:center;

}



#qrcode{

display:flex;

justify-content:center;

margin-top:20px;

}



</style>


</head>



<body>



<button class="btn-menu" onclick="window.location.href='./index.html'">

🏠 VOLTAR AO MENU

</button>





<div class="container">


<div class="card">



<h1>

Atendimento Fisioterapêutico

</h1>





<div class="box">


<h2>

Paciente em atendimento

</h2>



<h3 id="nome">

Carregando...

</h3>



<div id="dados" class="info">

</div>


</div>







<label>

Conduta realizada

</label>



<textarea

id="conduta"

placeholder="Descreva a conduta realizada">

</textarea>







<label>

Observações

</label>



<textarea

id="observacoes"

placeholder="Digite observações do atendimento">

</textarea>







<button

class="btn-finalizar"

onclick="salvarAtendimento()">

Finalizar Atendimento

</button>








<div class="qr-area">


<h2>

Avaliação do paciente

</h2>



<p>

Após finalizar o atendimento, o QR Code aparecerá abaixo.

</p>




<div id="qrcode">

</div>



</div>







</div>


</div>








<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>



<script type="module" src="atendimento.js"></script>



</body>

</html>
