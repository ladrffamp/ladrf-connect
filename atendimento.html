<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atendimento | LADRF Connect</title>


<style>

*{

box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;

}


body{

margin:0;
background:#eef3f7;
padding:30px;

}


.container{

max-width:800px;
margin:auto;

}



.card{

background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.12);

}



h1{

text-align:center;
color:#0B7A3B;
margin-bottom:25px;

}



.box{

background:#f5f5f5;
padding:20px;
border-radius:15px;
margin-bottom:25px;

}



label{

font-weight:bold;
display:block;
margin-top:15px;

}



textarea{

width:100%;
height:120px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
margin-top:8px;
resize:none;

}



select{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:8px;

}



button{

width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
background:#0B7A3B;
color:white;
font-size:18px;
cursor:pointer;

}



button:hover{

background:#08642f;

}



.qr-area{

text-align:center;
margin-top:30px;

}



#qrcode{

display:flex;
justify-content:center;
margin-top:20px;

}



.aviso{

text-align:center;
color:#555;
margin-top:15px;

}


</style>

</head>



<body>



<div class="container">


<div class="card">


<h1>

Atendimento Fisioterapêutico

</h1>



<div class="box">


<h2>

Paciente em atendimento

</h2>


<h3 id="nome">

Carregando...

</h3>


<div id="dados">

</div>


</div>





<label>

Conduta realizada

</label>


<textarea

id="conduta"

placeholder="Descreva a conduta realizada">

</textarea>





<label>

Observações

</label>


<textarea

id="observacoes"

placeholder="Digite observações do atendimento">

</textarea>





<button onclick="salvarAtendimento()">

Finalizar Atendimento

</button>






<div class="qr-area">


<h2>

Avaliação do paciente

</h2>


<p class="aviso">

Após finalizar, gere o QR Code para o paciente avaliar.

</p>



<div id="qrcode">

</div>



</div>



</div>


</div>





<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<script type="module" src="atendimento.js"></script>



<script type="module" src="permissoes.js"></script>



</body>


</html>
