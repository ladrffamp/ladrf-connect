<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exportação | LADRF Connect</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}


body{

background:#eef3f7;
color:#333;

}


header{

background:linear-gradient(90deg,#0B7A3B,#15A34A);

color:white;

padding:25px 40px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}


header h1{

font-size:28px;

}


.botao{

background:#0B7A3B;

color:white;

padding:12px 22px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

font-size:15px;

display:inline-flex;

align-items:center;

gap:8px;

}


.botao:hover{

background:#09632f;

}


.container{

max-width:1300px;

margin:auto;

padding:35px;

}


.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:25px;

margin-bottom:30px;

}


.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}


.card i{

font-size:35px;

color:#0B7A3B;

margin-bottom:15px;

}


.card h2{

font-size:20px;

margin-bottom:10px;

table{

width:100%;

border-collapse:collapse;

}


th{

padding:15px;

text-align:left;

}


td{

padding:15px;

border-bottom:1px solid #eee;

}


@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

}


@media(max-width:700px){

table{

display:block;

overflow-x:auto;

white-space:nowrap;

}

}


</style>


</head>


<body>


<header>


<div>

<h1>

<i class="fa-solid fa-file-export"></i>

Exportação

</h1>


<p>

Relatórios e estatísticas LADRF

</p>


</div>


<button class="botao" onclick="window.location='index.html'">

<i class="fa-solid fa-house"></i>

Início

</button>


</header>



<div class="container">


<div class="grid">



<div class="card">

<i class="fa-solid fa-file-pdf"></i>


<h2>

Relatório PDF

</h2>


<p>

Gerar relatório completo dos atendimentos

</p>


<br>


<button class="botao" id="gerarPDF">

<i class="fa-solid fa-download"></i>

Gerar PDF

</button>


</div>




<div class="card">

<i class="fa-solid fa-file-excel"></i>


<h2>

Relatório Excel

</h2>


<p>

Exportar dados para planilha

</p>


<br>


<button class="botao" id="gerarExcel">

<i class="fa-solid fa-table"></i>

Gerar Excel

</button>


</div>




<div class="card">

<i class="fa-solid fa-chart-line"></i>


<h2>

Estatísticas

</h2>


<p>

Análise dos eventos LADRF

</p>


<br>


<button class="botao" id="carregarDados">

<i class="fa-solid fa-chart-column"></i>

Atualizar

</button>


</div>



</div>
<div class="card">


<h2>

<i class="fa-solid fa-calendar-days"></i>

Estatísticas por evento

</h2>


<br>


<table>


<thead>

<tr style="background:#0B7A3B;color:white;">


<th>

Evento

</th>


<th>

Pacientes

</th>


<th>

Atendimentos

</th>


</tr>


</thead>



<tbody id="tabelaEventos">


<tr>

<td colspan="3" style="text-align:center">

Carregando dados...

</td>

</tr>


</tbody>


</table>


</div>


</div>




<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


<script type="module" src="exportacao.js"></script>



</body>

</html>
}
