<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Paciente - LADRF Connect</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
color:#0B7A3B;
}

input,select,textarea{

width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;

}

textarea{

height:100px;

}


button{

width:100%;
padding:15px;
margin-top:20px;
background:#0B7A3B;
color:white;
border:none;
border-radius:8px;
font-size:16px;

}


#qrcode{

margin-top:30px;
text-align:center;

}


</style>

</head>


<body>


<div class="container">


<h1>
Cadastro de Paciente
</h1>


<input id="nome" placeholder="Nome completo">


<input id="idade" placeholder="Idade" type="number">


<input id="whatsapp" placeholder="WhatsApp">


<select id="modalidade">

<option value="Futebol">Futebol</option>

<option value="Vôlei">Vôlei</option>

<option value="Futsal">Futsal</option>

<option value="Cross Training">Cross Training</option>

<option value="Corrida">Corrida</option>

<option value="Outro">Outro</option>

</select>


<textarea id="queixa" placeholder="Queixa principal"></textarea>


<button onclick="cadastrar()">

Cadastrar Paciente

</button>


<div id="qrcode"></div>


</div>



<!-- Biblioteca QR Code -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<script type="module" src="cadastro.js"></script>

<script type="module" src="permissoes.js"></script>


</body>

</html>
