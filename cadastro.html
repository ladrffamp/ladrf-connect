<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect - Cadastro</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

background:#f4f6f9;

margin:0;

padding:30px;

}



/* BOTÃO MENU */

.btn-voltar{

position:fixed;

top:20px;

left:20px;

z-index:9999;

background:#0B7A3B;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

font-size:15px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}



.btn-voltar:hover{

background:#075c2b;

}



.container{

max-width:500px;

margin:auto;

}



.card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

}



h1{

text-align:center;

color:#0B7A3B;

margin-bottom:25px;

}



label{

display:block;

font-weight:bold;

margin-top:15px;

}



input,
select,
textarea{

width:100%;

padding:12px;

margin-top:5px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}



textarea{

height:100px;

resize:none;

}



button{

width:100%;

padding:14px;

margin-top:25px;

background:#0B7A3B;

color:white;

border:none;

border-radius:10px;

font-size:17px;

cursor:pointer;

}



button:hover{

background:#075c2b;

}



.qr-box{

margin-top:35px;

padding-top:25px;

border-top:1px solid #ddd;

text-align:center;

}



#qrcode{

display:flex;

justify-content:center;

align-items:center;

margin-top:20px;

min-height:220px;

}



.info{

color:#666;

font-size:14px;

}



</style>


</head>


<body>



<button class="btn-voltar" onclick="window.location.href='index.html'">

🏠 Menu Inicial

</button>





<div class="container">


<div class="card">


<h1>

Cadastro de Paciente

</h1>



<form id="formCadastro">



<label>

Nome

</label>


<input

type="text"

id="nome"

required

>





<label>

WhatsApp

</label>


<input

type="text"

id="whatsapp"

>





<label>

Idade

</label>


<input

type="text"

id="idade"

>





<label>

Modalidade

</label>


<select id="modalidade" required>

<option value="">

Carregando modalidades...

</option>


</select>





<label>

Queixa principal

</label>



<textarea

id="queixa"

placeholder="Descreva a queixa">

</textarea>





<button type="submit">

Cadastrar Paciente

</button>



</form>






<div class="qr-box">


<h2>

QR Code de acompanhamento

</h2>


<p class="info">

Entregue este QR Code ao paciente para acompanhar a fila.

</p>




<div id="qrcode">

</div>




</div>







</div>


</div>







<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<script type="module" src="cadastro.js"></script>



</body>

</html>
