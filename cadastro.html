<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LADRF Connect - Cadastro</title>

<link rel="stylesheet" href="styles.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
}

.sidebar{

width:250px;
height:100vh;
background:#0B7A3B;
padding:20px;
position:fixed;
color:white;

}

.sidebar h2{

text-align:center;
margin-bottom:30px;

}

.sidebar a{

display:block;
padding:15px;
margin-bottom:12px;
background:rgba(255,255,255,.1);
border-radius:10px;
color:white;
text-decoration:none;

}

.sidebar a:hover{

background:white;
color:#0B7A3B;

}

.content{

margin-left:250px;
padding:40px;
width:100%;

}

.card{

background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
max-width:700px;

}

input,select,textarea{

width:100%;
padding:14px;
margin-top:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;

}

textarea{

height:120px;
resize:none;

}

button{

margin-top:20px;
padding:15px;
width:100%;
background:#0B7A3B;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#09622f;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>LADRF CONNECT</h2>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="cadastro.html">📝 Cadastro</a>

<a href="fila.html">👥 Fila</a>

<a href="macas.html">🛏️ Macas</a>

<a href="usuarios.html">👤 Usuários</a>

<a href="relatorios.html">📊 Relatórios</a>

</div>

<div class="content">

<div class="card">

<h2>Novo Atendimento</h2>

<input
id="nome"
placeholder="Nome completo">

<input
id="idade"
type="number"
placeholder="Idade">

<input
id="whatsapp"
placeholder="WhatsApp">

<select id="modalidade">

<option>Futebol</option>
<option>Futsal</option>
<option>Vôlei</option>
<option>Basquete</option>
<option>Handebol</option>
<option>Cross Training</option>
<option>Corrida</option>
<option>Outro</option>

</select>

<textarea
id="queixa"
placeholder="Queixa principal"></textarea>

<button onclick="cadastrar()">

Cadastrar Paciente

</button>

</div>

</div>

<script type="module" src="cadastro.js"></script>
<script type="module" src="auth.js"></script>

</body>

</html>
