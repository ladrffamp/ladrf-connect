<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect - Cadastro</title>

<link rel="stylesheet" href="styles.css">


<style>

body{

background:#f4f6f9;

font-family:Arial,Helvetica,sans-serif;

}



.container{

max-width:500px;

margin:40px auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}



h1{

text-align:center;

color:#0B7A3B;

margin-bottom:25px;

}



label{

display:block;

margin-top:15px;

font-weight:bold;

}



input,
select,
textarea{

width:100%;

padding:12px;

margin-top:5px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;

}



textarea{

height:100px;

resize:none;

}



button{

width:100%;

margin-top:25px;

padding:14px;

background:#0B7A3B;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#075d2d;

}


</style>

</head>


<body>


<div class="container">


<h1>
Cadastro de Paciente
</h1>



<form id="formCadastro">


<label>
Nome
</label>

<input 
type="text"
id="nome"
required
>




<label>
WhatsApp
</label>

<input 
type="text"
id="whatsapp"
>




<label>
Idade
</label>

<input 
type="text"
id="idade"
>




<label>
Modalidade
</label>

<select id="modalidade" required>

<option value="">
Selecione
</option>

<option>
Futebol
</option>

<option>
CrossFit
</option>

<option>
Vôlei
</option>

<option>
Beach Tennis
</option>

<option>
Corrida
</option>

<option>
Outro
</option>

</select>




<label>
Queixa principal
</label>

<textarea
id="queixa">
</textarea>




<button type="submit">

Cadastrar Paciente

</button>



</form>



</div>




<script type="module" src="cadastro.js"></script>


</body>


</html>
