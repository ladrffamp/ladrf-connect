<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect</title>

<link rel="stylesheet" href="styles.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
display:flex;
background:#f5f5f5;
}

.sidebar{

width:250px;

height:100vh;

background:#0B7A3B;

color:white;

padding:20px;

position:fixed;

left:0;

top:0;

}

.sidebar h2{

margin-bottom:30px;

}

.sidebar a{

display:block;

padding:15px;

margin-bottom:10px;

background:rgba(255,255,255,.1);

border-radius:10px;

text-decoration:none;

color:white;

transition:.3s;

}

.sidebar a:hover{

background:white;

color:#0B7A3B;

}

.content{

margin-left:270px;

padding:30px;

width:100%;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;

}

.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

text-align:center;

}

.numero{

font-size:35px;

color:#0B7A3B;

font-weight:bold;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>LADRF CONNECT</h2>

<a href="cadastro.html">📝 Cadastro</a>

<a href="fila.html">👥 Fila</a>

<a href="macas.html">🛏️ Macas</a>

<a href="usuarios.html">👤 Usuários</a>

<a href="relatorios.html">📊 Relatórios</a>

<a href="#" id="logout">🚪 Sair</a>

</div>

<div class="content">

<h1>Dashboard</h1>

<p>Bem-vindo ao sistema.</p>

<div class="cards">

<div class="card">

<h3>Pacientes</h3>

<div class="numero" id="pacientes">
0
</div>

</div>

<div class="card">

<h3>Em Espera</h3>

<div class="numero" id="espera">
0
</div>

</div>

<div class="card">

<h3>Em Atendimento</h3>

<div class="numero" id="atendimento">
0
</div>

</div>

<div class="card">

<h3>Finalizados</h3>

<div class="numero" id="finalizados">
0
</div>

</div>

</div>

</div>

<script type="module" src="dashboard.js"></script>
<script type="module" src="auth.js"></script>

</body>

</html>
