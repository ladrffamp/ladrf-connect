<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect - Painel</title>

<link rel="stylesheet" href="styles.css">


<style>

body{

font-family:Arial;
background:#f4f6f9;
padding:30px;

}


h1{

color:#0B7A3B;
margin-bottom:30px;

}



.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}



.numero{

font-size:40px;

font-weight:bold;

color:#0B7A3B;

}



table{

width:100%;

margin-top:30px;

background:white;

border-collapse:collapse;

}



th{

background:#0B7A3B;

color:white;

padding:15px;

}



td{

padding:15px;

border-bottom:1px solid #ddd;

text-align:center;

}


</style>

</head>


<body>


<h1>
Painel de Atendimento LADRF Connect
</h1>



<div class="cards">


<div class="card">

<h3>
Aguardando
</h3>

<div id="aguardando" class="numero">
0
</div>

</div>




<div class="card">

<h3>
Em atendimento
</h3>

<div id="atendimento" class="numero">
0
</div>

</div>





<div class="card">

<h3>
Macas livres
</h3>

<div id="livres" class="numero">
0
</div>

</div>





<div class="card">

<h3>
Macas ocupadas
</h3>

<div id="ocupadas" class="numero">
0
</div>

</div>



</div>





<h2>

Pacientes em atendimento

</h2>


<table>


<thead>

<tr>

<th>Paciente</th>

<th>Maca</th>

<th>Modalidade</th>

</tr>

</thead>


<tbody id="listaAtendimento">

</tbody>


</table>






<script type="module" src="dashboard.js"></script>


</body>


</html>
