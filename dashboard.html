<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect - Dashboard</title>

<link rel="stylesheet" href="styles.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{

width:250px;
height:100vh;
background:#0B7A3B;
color:white;
position:fixed;
left:0;
top:0;
padding:20px;

}

.sidebar h2{

text-align:center;
margin-bottom:30px;

}

.sidebar a{

display:block;
padding:15px;
margin-bottom:12px;
border-radius:10px;
background:rgba(255,255,255,.1);
color:white;
text-decoration:none;
transition:.3s;

}

.sidebar a:hover{

background:white;
color:#0B7A3B;

}

.content{

margin-left:250px;
padding:35px;
width:100%;

}

.content h1{

margin-bottom:10px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;

}

.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;

}

.card h2{

font-size:45px;
margin-bottom:15px;

}

.card h3{

margin-bottom:15px;
color:#555;

}

.numero{

font-size:38px;
font-weight:bold;
color:#0B7A3B;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>LADRF CONNECT</h2>

<a href="cadastro.html">
📝 Cadastro de Pacientes
</a>

<a href="fila.html">
👥 Fila
</a>

<a href="macas.html">
🛏️ Controle de Macas
</a>

<a href="usuarios.html" class="admin">
👤 Usuários
</a>

<a href="relatorios.html" class="admin">
📊 Relatórios
</a>

<a href="#" id="logout">
🚪 Sair
</a>

</div>

<div class="content">

<h1>Dashboard</h1>

<p>Sistema de Gestão de Atendimentos LADRF Connect</p>

<div class="cards">

<div class="card">

<h2>👥</h2>

<h3>Total de Pacientes</h3>

<div class="numero" id="pacientes">

0

</div>

</div>

<div class="card">

<h2>🟡</h2>

<h3>Aguardando</h3>

<div class="numero" id="espera">

0

</div>

</div>

<div class="card">

<h2>🛏️</h2>

<h3>Em Atendimento</h3>

<div class="numero" id="atendimento">

0

</div>

</div>

<div class="card">

<h2>✅</h2>

<h3>Finalizados</h3>

<div class="numero" id="finalizados">

0

</div>

</div>

</div>

</div>

<script type="module" src="dashboard.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="permissoes.js"></script>

</body>

</html>
