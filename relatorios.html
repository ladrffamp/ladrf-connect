<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatórios LADRF</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f4f6f9;
padding:30px;

}


.container{

max-width:1000px;
margin:auto;

}


h1{

color:#0B7A3B;

}


.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}


.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;

}


.numero{

font-size:35px;
font-weight:bold;
color:#0B7A3B;

}


</style>

</head>


<body>


<div class="container">


<h1>
Relatórios LADRF
</h1>



<div class="cards">


<div class="card">

<h3>
Atendimentos
</h3>

<p class="numero" id="total">

0

</p>

</div>




<div class="card">

<h3>
Pacientes atendidos
</h3>

<p class="numero" id="pacientes">

0

</p>

</div>





<div class="card">

<h3>
Modalidade principal
</h3>

<p class="numero" id="modalidade">

-

</p>

</div>




<div class="card">

<h3>
Membro com mais atendimentos
</h3>

<p class="numero" id="membro">

-

</p>

</div>



</div>



</div>



<script type="module" src="relatorios.js"></script>

<script type="module" src="permissoes.js"></script>


</body>

</html>
