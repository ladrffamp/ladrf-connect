<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatórios - LADRF Connect</title>

<style>

body{

font-family:Arial,Helvetica,sans-serif;

background:#f4f6f9;

padding:30px;

}

h1{

color:#0B7A3B;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;

}

.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

text-align:center;

}

.numero{

font-size:40px;

font-weight:bold;

color:#0B7A3B;

margin-top:10px;

}

.lista{

margin-top:30px;

background:white;

padding:25px;

border-radius:15px;

}

li{

padding:10px;

border-bottom:1px solid #ddd;

}

</style>

</head>

<body>


<h1>Relatórios do Evento</h1>


<div class="cards">


<div class="card">

<h3>Total de Pacientes</h3>

<div class="numero" id="total">

0

</div>

</div>


<div class="card">

<h3>Aguardando</h3>

<div class="numero" id="aguardando">

0

</div>

</div>


<div class="card">

<h3>Em Atendimento</h3>

<div class="numero" id="atendimento">

0

</div>

</div>


<div class="card">

<h3>Finalizados</h3>

<div class="numero" id="finalizados">

0

</div>

</div>


</div>



<div class="lista">

<h2>Modalidades atendidas</h2>

<ul id="modalidades">

</ul>

</div>


<script type="module" src="relatorios.js"></script>

<script type="module" src="permissoes.js"></script>


</body>

</html>
