<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatórios LADRF</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

background:#f4f6f9;
padding:30px;

}



.btn-voltar{

position:fixed;

top:20px;

left:20px;

background:#0B7A3B;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

cursor:pointer;

}



.container{

max-width:1200px;

margin:auto;

}



h1{

color:#0B7A3B;

margin-bottom:30px;

}



.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:20px;

}



.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

text-align:center;

}



.card h3{

color:#555;

}



.numero{

font-size:35px;

font-weight:bold;

color:#0B7A3B;

}



</style>

</head>

<button class="btn-voltar" onclick="window.location.href='index.html'">

</html>
