<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Usuários - LADRF Connect</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
padding:30px;
}

.container{

max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

h1{

color:#0B7A3B;

}

table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}

th{

background:#0B7A3B;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;
border-bottom:1px solid #ddd;

}

select{

padding:8px;
border-radius:8px;

}

button{

padding:8px 12px;
border:none;
border-radius:8px;
background:#0B7A3B;
color:white;
cursor:pointer;

}

.excluir{

background:#d32f2f;

}

</style>

</head>

<body>

<div class="container">

<h1>Gerenciamento de Usuários</h1>

<table>

<thead>

<tr>

<th>Nome</th>

<th>Email</th>

<th>Perfil</th>

<th>Ação</th>

</tr>

</thead>


<tbody id="listaUsuarios">

</tbody>


</table>


</div>


<script type="module" src="usuarios.js"></script>

<script type="module" src="permissoes.js"></script>


</body>

</html>
