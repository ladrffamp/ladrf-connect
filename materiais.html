<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Materiais | LADRF Connect 2.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3f7;
color:#333;
}

header{
background:linear-gradient(90deg,#0B7A3B,#15A34A);
color:#fff;
padding:20px 35px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.12);
}

header h1{
font-size:28px;
font-weight:700;
}

header p{
font-size:14px;
opacity:.9;
margin-top:3px;
}

.botao{
background:#0B7A3B;
color:#fff;
border:none;
padding:12px 22px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.25s;
}

.botao:hover{
background:#0f9146;
}

.container{
max-width:1400px;
margin:auto;
padding:35px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.busca{
position:relative;
flex:1;
min-width:280px;
}

.busca input{
width:100%;
padding:14px 18px 14px 45px;
border:none;
border-radius:12px;
font-size:15px;
background:#fff;
box-shadow:0 5px 15px rgba(0,0,0,.08);
outline:none;
}

.busca i{
position:absolute;
left:16px;
top:15px;
color:#777;
}

.botoes{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.resumo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card i{
font-size:34px;
color:#0B7A3B;
margin-bottom:10px;
}

.card h3{
font-size:17px;
margin-bottom:8px;
}

.numero{
font-size:30px;
font-weight:bold;
color:#0B7A3B;
}

.tabela{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#0B7A3B;
color:#fff;
}

th{
padding:18px;
text-align:left;
font-size:15px;
}

td{
padding:18px;
border-bottom:1px solid #ececec;
font-size:15px;
}

tbody tr:hover{
background:#f7f7f7;
}

.status{
padding:6px 12px;
border-radius:30px;
font-size:13px;
font-weight:600;
display:inline-block;
}

.normal{
background:#d4edda;
color:#155724;
}

.baixo{
background:#fff3cd;
color:#856404;
}

.esgotado{
background:#f8d7da;
color:#721c24;
}

.acoes{
display:flex;
gap:8px;
}

.btn-icon{
width:38px;
height:38px;
border:none;
border-radius:10px;
cursor:pointer;
color:#fff;
font-size:15px;
}

.entrada{
background:#198754;
}

.saida{
background:#dc3545;
}

.editar{
background:#0d6efd;
}

.excluir{
background:#6c757d;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#fff;
width:95%;
max-width:550px;
padding:30px;
border-radius:18px;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input,
.modal-content select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.modal-footer{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:15px;
}

footer{
padding:30px;
text-align:center;
color:#666;
}

@media(max-width:900px){

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

header{
flex-direction:column;
gap:15px;
text-align:center;
}

.topo{
flex-direction:column;
align-items:stretch;
}

}

</style>

</head>

<body>

<header>

<div>

<h1><i class="fa-solid fa-boxes-stacked"></i> Materiais</h1>

<p>Controle de estoque da LADRF</p>

</div>

<button class="botao" onclick="window.location='index.html'">

<i class="fa-solid fa-house"></i>

Início

</button>

</header>

<div class="container">

<div class="topo">

<div class="busca">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar material...">

</div>

<div class="botoes">

<button class="botao" id="novoMaterial">

<i class="fa-solid fa-plus"></i>

Novo Material

</button>

</div>

</div>
<!-- RESUMO -->

<div class="resumo">

    <div class="card">

        <i class="fa-solid fa-box"></i>

        <h3>Total de Materiais</h3>

        <div class="numero" id="totalMateriais">0</div>

    </div>

    <div class="card">

        <i class="fa-solid fa-triangle-exclamation"></i>

        <h3>Estoque Baixo</h3>

        <div class="numero" id="estoqueBaixo">0</div>

    </div>

    <div class="card">

        <i class="fa-solid fa-circle-xmark"></i>

        <h3>Esgotados</h3>

        <div class="numero" id="esgotados">0</div>

    </div>

    <div class="card">

        <i class="fa-solid fa-arrow-right-arrow-left"></i>

        <h3>Movimentações Hoje</h3>

        <div class="numero" id="movimentacoesHoje">0</div>

    </div>

</div>



<!-- TABELA -->

<div class="tabela">

<table>

    <thead>

        <tr>

            <th>Material</th>

            <th>Categoria</th>

            <th>Quantidade</th>

            <th>Mínimo</th>

            <th>Unidade</th>

            <th>Status</th>

            <th style="width:170px;">Ações</th>

        </tr>

    </thead>

    <tbody id="listaMateriais">

        <tr>

            <td colspan="7" style="text-align:center;padding:35px;">

                <i class="fa-solid fa-spinner fa-spin"></i>

                Carregando materiais...

            </td>

        </tr>

    </tbody>

</table>

</div>
<!-- MODAL -->

<div class="modal" id="modalMaterial">

    <div class="modal-content">

        <h2 id="tituloModal">

            Novo Material

        </h2>

        <input
            type="text"
            id="nome"
            placeholder="Nome do material">

        <select id="categoria">

            <option value="">Selecione uma categoria</option>

            <option value="Bandagens">Bandagens</option>

            <option value="Crioterapia">Crioterapia</option>

            <option value="Kinesio Tape">Kinesio Tape</option>

            <option value="EPIs">EPIs</option>

            <option value="Equipamentos">Equipamentos</option>

            <option value="Medicamentos">Medicamentos</option>

            <option value="Outros">Outros</option>

        </select>

        <input
            type="number"
            id="quantidade"
            min="0"
            placeholder="Quantidade em estoque">

        <input
            type="number"
            id="minimo"
            min="0"
            placeholder="Estoque mínimo">

        <select id="unidade">

            <option value="unidades">Unidades</option>

            <option value="rolos">Rolos</option>

            <option value="pares">Pares</option>

            <option value="caixas">Caixas</option>

            <option value="frascos">Frascos</option>

            <option value="kg">Kg</option>

            <option value="litros">Litros</option>

        </select>

        <div class="modal-footer">

            <button
                class="botao"
                style="background:#6c757d;"
                id="cancelarModal">

                Cancelar

            </button>

            <button
                class="botao"
                id="salvarMaterial">

                Salvar

            </button>

        </div>

    </div>

</div>

<footer>

LADRF Connect 2.0 • Controle de Materiais

</footer>

<script type="module" src="materiais.js"></script>

</body>
</html>
