<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LADRF Connect - Fila</title>

<link rel="stylesheet" href="styles.css">


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;

}


body{

background:#f4f6f9;

}



/* BOTÃO MENU */

.btn-voltar{

position:fixed;

top:20px;

left:20px;

z-index:9999;

background:#0B7A3B;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

font-size:15px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}



.btn-voltar:hover{

background:#075c2b;

}




header{

background:#0B7A3B;

color:white;

padding:20px;

}



.container{

padding:30px;

}



.topo{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}



button{

padding:10px 18px;

border:none;

border-radius:8px;

cursor:pointer;

color:white;

font-size:15px;

}



.chamar{

background:#1976d2;

}



.chamar:hover{

background:#125aa0;

}



table{

width:100%;

border-collapse:collapse;

background:white;

border-radius:10px;

overflow:hidden;

}



th{

background:#0B7A3B;

color:white;

padding:15px;

}



td{

padding:15px;

text-align:center;

border-bottom:1px solid #eee;

}



.acao{

background:#1976d2;

}



.vazio{

text-align:center;

padding:30px;

color:#777;

}



</style>


</head>



<body>



<button class="btn-voltar" onclick="window.location.href='index.html'">

🏠 Menu Inicial

</button>





<header>

<h1>

Fila de Atendimento

</h1>

</header>





<div class="container">



<div class="topo">


<h2>

Pacientes aguardando

</h2>



<button class="chamar" onclick="chamarProximo()">

Chamar Próximo Paciente

</button>



</div>







<table>


<thead>


<tr>

<th>Paciente</th>

<th>Modalidade</th>

<th>Status</th>

<th>Maca</th>

<th>Ação</th>


</tr>


</thead>



<tbody id="lista">


</tbody>



</table>



</div>






<script type="module" src="fila.js"></script>

<script type="module" src="auth.js"></script>



</body>


</html>
