<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LADRF Connect - Fila</title>

<link rel="stylesheet" href="styles.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

header{

background:#0B7A3B;
color:white;
padding:20px;

}

.container{

padding:30px;

}

table{

width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;

}

th{

background:#0B7A3B;
color:white;
padding:15px;

}

td{

padding:15px;
text-align:center;
border-bottom:1px solid #eee;

}

button{

padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;

}

.chamar{

background:#1976d2;

}

.finalizar{

background:#2e7d32;

}

</style>

</head>

<body>

<header>

<h1>Fila de Atendimento</h1>

</header>

<div class="container">

<table>

<thead>

<tr>

<th>Paciente</th>

<th>Modalidade</th>

<th>Status</th>

<th>Maca</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="lista">

</tbody>

</table>

</div>

<script type="module" src="fila.js"></script>
<script type="module" src="auth.js"></script>

</body>

</html>
