<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Frequência | LADRF Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#eef3f7;
}

header{

background:linear-gradient(90deg,#0B7A3B,#15A34A);

padding:25px 40px;

display:flex;

justify-content:space-between;

align-items:center;

color:#fff;

}

header h1{

font-size:28px;

}

.btn{

background:white;

color:#0B7A3B;

border:none;

padding:12px 20px;

border-radius:10px;

cursor:pointer;

font-weight:600;

transition:.3s;

}

.btn:hover{

transform:scale(1.03);

}

.container{

max-width:1400px;

margin:auto;

padding:30px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

margin-bottom:25px;

}

h2{

margin-bottom:20px;

color:#0B7A3B;

}

label{

display:block;

font-weight:600;

margin-bottom:8px;

}

select{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #ccc;

margin-bottom:20px;

font-size:15px;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-top:20px;

}

.stat{

background:#f8fafb;

padding:20px;

border-radius:15px;

text-align:center;

}

.stat h3{

font-size:15px;

color:#555;

margin-bottom:10px;

}

.stat span{

font-size:30px;

font-weight:bold;

color:#0B7A3B;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#0B7A3B;

color:white;

padding:14px;

}

td{

padding:14px;

border-bottom:1px solid #eee;

}

.presente{

background:#16a34a;

color:white;

border:none;

padding:8px 15px;

border-radius:8px;

cursor:pointer;

}

.ausente{

background:#dc2626;

color:white;

border:none;

padding:8px 15px;

border-radius:8px;

cursor:pointer;

}

.status{

font-weight:bold;

}

.status.presente{

color:#16a34a;

background:none;

}

.status.ausente{

color:#dc2626;

background:none;

}

.status.pendente{

color:#f59e0b;

background:none;

}

</style>

</head>

<body>

<header>

<div>

<h1>

<i class="fa-solid fa-clipboard-check"></i>

Frequência

</h1>

<p>

Controle de presença dos membros

</p>

</div>

<button
class="btn"
onclick="window.location='index.html'">

<i class="fa-solid fa-house"></i>

Início

</button>

</header>

<div class="container">

<div class="card">

<h2>

Selecionar Evento

</h2>

<label>

Evento

</label>

<select id="evento">

<option>

Carregando eventos...

</option>

</select>

</div>

<div class="stats">

<div class="stat">

<h3>

👥 Total

</h3>

<span id="totalMembros">

0

</span>

</div>

<div class="stat">

<h3>

🟢 Presentes

</h3>

<span id="presentes">

0

</span>

</div>

<div class="stat">

<h3>

🟡 Pendentes

</h3>

<span id="pendentes">

0

</span>

</div>

<div class="stat">

<h3>

🔴 Ausentes

</h3>

<span id="ausentes">

0

</span>

</div>

</div>

<div class="card">

<h2>

Lista de Presença

</h2>

<table>

<thead>

<tr>

<th>Nome</th>

<th>Curso</th>

<th>Status</th>

<th>Horário</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="listaPresenca">

<tr>

<td colspan="5" style="text-align:center;">

Selecione um evento.

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script type="module" src="frequencia.js"></script>

</body>

</html>
