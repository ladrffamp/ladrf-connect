<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificados | LADRF Connect</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}



body{

background:#eef3f7;

}



header{

background:linear-gradient(90deg,#0B7A3B,#15A34A);

color:white;

padding:25px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}



header h1{

font-size:28px;

}



.btn{

background:#0B7A3B;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}



.container{

max-width:1100px;

margin:auto;

padding:35px;

}



.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 8px 20px rgba(0,0,0,.1);

margin-bottom:25px;

}



label{

display:block;

font-weight:bold;

margin-top:15px;

}



input,
select{

width:100%;

padding:12px;

margin-top:5px;

border-radius:8px;

border:1px solid #ccc;

}



button{

margin-top:20px;

}



.certificado-lista{

margin-top:20px;

}



table{

width:100%;

border-collapse:collapse;

}



th{

background:#0B7A3B;

color:white;

padding:12px;

text-align:left;

}



td{

padding:12px;

border-bottom:1px solid #ddd;

}



</style>


</head>


<body>


<header>


<div>

<h1>

<i class="fa-solid fa-certificate"></i>

Certificados

</h1>


<p>

Emissão de certificados LADRF

</p>


</div>



<button class="btn" onclick="window.location='index.html'">

<i class="fa-solid fa-house"></i>

Início

</button>


</header>

<div class="container">

<div class="card">


<h2>

Gerar Certificado

</h2>



<label>

Membro

</label>


<select id="membro">

<option value="">

Carregando membros...

</option>


</select>





<label>

Evento

</label>


<select id="evento">


<option value="">

Carregando eventos...

</option>


</select>





<label>

Carga horária

</label>


<input

type="text"

id="cargaHoraria"

placeholder="Ex: 10 horas"

>





<button class="btn" id="gerarCertificado">


<i class="fa-solid fa-file-pdf"></i>

Gerar Certificado PDF


</button>



</div>





<div class="card">


<h2>

Certificados emitidos

</h2>



<table>


<thead>

<tr>


<th>

Nome

</th>


<th>

Evento

</th>


<th>

Data

</th>


<th>

Ação

</th>


</tr>


</thead>



<tbody id="listaCertificados">


<tr>

<td colspan="4">

Nenhum certificado emitido

</td>

</tr>


</tbody>


</table>


</div>





</div>





<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<script type="module" src="certificados.js"></script>



</body>

</html>
<div class="container">
