<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acompanhamento | LADRF Connect</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

margin:0;

padding:30px;

background:#eef3f7;

}


.container{

max-width:500px;

margin:auto;

}



.card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

text-align:center;

}



h1{

color:#0B7A3B;

}



.status{

font-size:28px;

font-weight:bold;

margin:30px 0;

}



.aguardando{

color:#d89b00;

}



.atendimento{

color:#1976d2;

}



.finalizado{

color:#0B7A3B;

}



.info{

background:#f5f5f5;

padding:20px;

border-radius:15px;

font-size:17px;

line-height:1.8;

}



button{

margin-top:25px;

padding:14px 20px;

background:#0B7A3B;

color:white;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

}



</style>


</head>


<body>


<div class="container">


<div class="card">


<h1>
LADRF Connect
</h1>


<h2>
Acompanhamento
</h2>



<div id="status" class="status">

Carregando...

</div>




<div id="dados" class="info">

</div>





<button onclick="ativarSom()">

🔔 Ativar aviso sonoro

</button>



</div>

</div>





<audio id="somChamada" preload="auto">

<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">

<source src="https://actions.google.com/sounds/v1/alarms/beep_short.mp3" type="audio/mpeg">

</audio>





<script>


window.audioLiberado = false;



function ativarSom(){


const som =
document.getElementById("somChamada");



som.volume = 1;



som.play()

.then(()=>{


som.pause();

som.currentTime = 0;


window.audioLiberado = true;



alert(
"Aviso sonoro ativado!"
);



})


.catch(()=>{


alert(
"Toque novamente para ativar."
);



});



}


</script>





<script type="module" src="acompanhamento.js"></script>


</body>

</html>
