<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acompanhamento - LADRF Connect</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;

}


body{

background:#eef3f7;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}



.container{

background:white;

width:90%;

max-width:450px;

padding:30px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

text-align:center;

}



.logo{

font-size:45px;

color:#0B7A3B;

margin-bottom:15px;

}



h1{

color:#0B7A3B;

margin-bottom:10px;

}



h2{

margin-top:25px;

font-size:22px;

}



.card{

margin-top:20px;

background:#f4f6f9;

padding:20px;

border-radius:15px;

}



.label{

color:#666;

font-size:14px;

}



.valor{

font-size:20px;

font-weight:bold;

color:#0B7A3B;

margin-top:5px;

}



.status{

margin-top:25px;

padding:15px;

border-radius:12px;

font-weight:bold;

background:#e8f5e9;

color:#0B7A3B;

}



.info{

margin-top:20px;

font-size:14px;

color:#555;

}



</style>


</head>


<body>


<div class="container">


<div class="logo">

❤️

</div>


<h1>

LADRF Connect

</h1>


<p>

Acompanhamento do atendimento

</p>




<div class="card">


<div class="label">

Paciente

</div>


<div 
class="valor"
id="nome">

Carregando...

</div>


</div>





<div class="card">


<div class="label">

Status

</div>


<div 
class="valor"
id="status">

Carregando...

</div>


</div>





<div class="card">


<div class="label">

Maca

</div>


<div 
class="valor"
id="maca">

-

</div>


</div>






<div 
class="status"
id="mensagem">

Aguarde sua vez.

</div>





<div class="info">


Você receberá uma notificação quando chegar sua vez de ser atendido.


</div>




</div>







<script type="module" src="acompanhamento.js"></script>


</body>

</html>
